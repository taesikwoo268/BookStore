# Database
spring.datasource.url=jdbc:mysql://localhost:3307/bookstore?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=3636

# Hibernate: không t?o b?ng, Flyway s? lŕm vi?c nŕy
spring.jpa.hibernate.ddl-auto=none

# Flyway (auto-config s? ??c các thu?c tính nŕy)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history

# Log ?? debug
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG

# ===== SWAGGER CONFIG =====
# OpenAPI Documentation
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.doc-expansion=none

# Packages to scan
springdoc.packages-to-scan=com.bookstore.controller

# Paths to include
springdoc.paths-to-match=/api/**,/api/v1/**

# Show actuator endpoints
springdoc.show-actuator=false
