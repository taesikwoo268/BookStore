# Database
spring.datasource.url=jdbc:mysql://localhost:3307/bookstore?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=3636

# Hibernate:
spring.jpa.hibernate.ddl-auto=none

# HIKARICP CONFIG
# =====================================================
# Tęn connection pool
spring.datasource.hikari.pool-name=BookStoreHikariPool

# S? connection t?i ?a trong pool
spring.datasource.hikari.maximum-pool-size=20

# S? connection t?i thi?u idle
spring.datasource.hikari.minimum-idle=5

# Th?i gian ch? t?i ?a khi l?y connection (ms)
spring.datasource.hikari.connection-timeout=30000

# Th?i gian t?i ?a connection t?n t?i trong pool (ms)
spring.datasource.hikari.max-lifetime=1800000

# Th?i gian connection idle tr??c khi b? ?óng (ms)
spring.datasource.hikari.idle-timeout=600000

# Ki?m tra connection khi l?y ra
spring.datasource.hikari.connection-test-query=SELECT 1

# Th?i gian ki?m tra connection (ms)
spring.datasource.hikari.validation-timeout=5000

# ===== HIBERNATE LOGGING =====
# Hien thi SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

# Log SQL parameters
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log statistics (s? l??ng queries)
logging.level.org.hibernate.stat=DEBUG
spring.jpa.properties.hibernate.generate_statistics=false

# Log N+1 detection
logging.level.org.hibernate.engine.internal.StatisticalLoggingSessionEventListener=DEBUG

# Flyway (auto-config s? ??c các thu?c tính nŕy)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history

# Log ?? debug
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG

# ===== SWAGGER CONFIG =====
# OpenAPI Documentation
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.doc-expansion=none

# Packages to scan
springdoc.packages-to-scan=com.bookstore.controller

# Paths to include
springdoc.paths-to-match=/api/**,/api/v1/**

# Show actuator endpoints
springdoc.show-actuator=false

# Logging configuration
logging.level.com.bookstore=DEBUG
logging.level.com.bookstore.aspect=DEBUG
logging.level.com.bookstore.service=INFO
logging.level.org.springframework=WARN

# Pattern cho log output
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) [%thread] %cyan(%logger{36}) - %msg%n
logging.pattern.level=%-5level

# Log AOP
logging.level.org.springframework.aop=DEBUG

# =====================================================
# JWT CONFIG
# =====================================================
app.jwt.secret=bookstoreSecretKey123456789012345678901234567890123456789012345678901234567890
# ???ng d?n ??n file key
app.jwt.private-key-path=classpath:keys/private_key.pem
app.jwt.public-key-path=classpath:keys/public_key.pem

# Access token expiration: 1 hour (3600000 milliseconds)
app.jwt.access-token-expiration=3600000

# Refresh token expiration: 7 days (604800000 milliseconds)
app.jwt.refresh-token-expiration=604800000